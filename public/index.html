<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Kanban Board</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --purple: #bc8cff; --yellow: #d29922;
    --col-backlog: #30363d; --col-progress: #1f6feb33; --col-done: #23883033;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 32px; width: 360px; }
  .login-box h1 { font-size: 24px; margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-box button:hover { filter: brightness(1.1); }
  .login-error { color: var(--red); font-size: 13px; margin-bottom: 8px; display: none; }

  /* App shell */
  #app { display: none; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
  header h1 span { font-size: 20px; }
  .user-badge { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
  .user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #fff; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px;
    border-radius: 6px; cursor: pointer; font-size: 13px; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* Main layout */
  .main { display: flex; height: calc(100vh - 53px); }
  .board-area { flex: 1; overflow-x: auto; padding: 24px; }
  .board-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .columns { display: flex; gap: 16px; height: calc(100% - 48px); }
  .column { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    width: 300px; min-width: 300px; display: flex; flex-direction: column; }
  .column-header { padding: 12px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; }
  .column-header .count { background: var(--border); border-radius: 10px; padding: 2px 8px;
    font-size: 12px; color: var(--muted); }
  .column:nth-child(1) .column-header { border-top: 3px solid var(--muted); border-radius: 10px 10px 0 0; }
  .column:nth-child(2) .column-header { border-top: 3px solid var(--accent); border-radius: 10px 10px 0 0; }
  .column:nth-child(3) .column-header { border-top: 3px solid var(--green); border-radius: 10px 10px 0 0; }
  .cards { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }

  /* Card */
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-label { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .card-assignee { font-size: 12px; color: var(--muted); margin-left: auto; }
  .card-comments { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 3px; }

  /* Move buttons */
  .move-actions { display: flex; gap: 4px; margin-top: 8px; }
  .move-btn { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer; }
  .move-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Activity sidebar */
  .sidebar { width: 360px; background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; font-weight: 600; font-size: 15px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; }
  .sidebar-header .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
  .activity-list { flex: 1; overflow-y: auto; padding: 8px; }
  .activity-item { padding: 10px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5;
    border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-action { font-weight: 600; }
  .activity-action.card_moved { color: var(--accent); }
  .activity-action.comment_added { color: var(--purple); }
  .activity-time { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .activity-user { color: var(--yellow); font-weight: 500; }

  /* Empty state */
  .empty { color: var(--muted); text-align: center; padding: 40px; font-size: 14px; }

  /* Toasts */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
  .toast { background: var(--green); color: #fff; padding: 10px 16px; border-radius: 8px;
    font-size: 13px; margin-top: 8px; animation: fadeIn 0.3s; font-weight: 500; }
  .toast.error { background: var(--red); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>&#128203; TaskFlow</h1>
    <p>Sign in to your Kanban board</p>
    <div class="login-error" id="login-error">Invalid credentials</div>
    <input type="email" id="email" placeholder="Email" value="alice@test.com">
    <input type="password" id="password" placeholder="Password" value="password123">
    <button onclick="login()">Sign in</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1><span>&#128203;</span> TaskFlow</h1>
    <div class="user-badge">
      <div class="avatar" id="user-avatar"></div>
      <span id="user-name"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>
  <div class="main">
    <div class="board-area">
      <div class="board-title" id="board-title"></div>
      <div class="columns" id="columns"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-header"><div class="dot"></div> Activity Feed</div>
      <div class="activity-list" id="activity-list"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let token = '';
let boardData = null;
let allLists = [];

function toast(msg, error = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (error ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const data = await api('/users/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    token = data.token;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const user = await api(`/users/${payload.userId}`);
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-avatar').textContent = user.name[0];
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadBoard();
  } catch (e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  token = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function loadBoard() {
  try {
    const boards = await api('/boards');
    if (!boards.length) { document.getElementById('board-title').textContent = 'No boards'; return; }
    boardData = await api(`/boards/${boards[0].id}`);
    allLists = boardData.lists;
    document.getElementById('board-title').textContent = boardData.name;
    renderBoard();
    loadActivity();
  } catch (e) {
    toast('Failed to load board', true);
  }
}

function renderBoard() {
  const container = document.getElementById('columns');
  container.innerHTML = '';
  for (const list of allLists) {
    const col = document.createElement('div');
    col.className = 'column';
    col.innerHTML = `
      <div class="column-header">${list.name} <span class="count">${list.cards.length}</span></div>
      <div class="cards" id="list-${list.id}"></div>
    `;
    container.appendChild(col);
    const cardsEl = col.querySelector('.cards');
    for (const card of list.cards) {
      cardsEl.appendChild(renderCard(card, list));
    }
    if (!list.cards.length) {
      cardsEl.innerHTML = '<div class="empty">No cards</div>';
    }
  }
}

function renderCard(card, currentList) {
  const el = document.createElement('div');
  el.className = 'card';
  const labels = (card.labels || []).map(l =>
    `<span class="card-label" style="background:${l.color}22;color:${l.color}">${l.name}</span>`
  ).join('');
  const assignee = card.assignee ? card.assignee.name : '';
  const commentCount = card.comments ? card.comments.length : 0;

  const otherLists = allLists.filter(l => l.id !== currentList.id);
  const moveButtons = otherLists.map(l =>
    `<button class="move-btn" onclick="moveCard(${card.id}, ${l.id}, event)">&rarr; ${l.name}</button>`
  ).join('');

  el.innerHTML = `
    <div class="card-title">${card.title}</div>
    <div class="card-meta">
      ${labels}
      ${commentCount ? `<span class="card-comments">&#128172; ${commentCount}</span>` : ''}
      ${assignee ? `<span class="card-assignee">${assignee}</span>` : ''}
    </div>
    <div class="move-actions">${moveButtons}</div>
  `;
  return el;
}

async function moveCard(cardId, targetListId, evt) {
  evt.stopPropagation();
  try {
    const res = await api(`/cards/${cardId}/move`, {
      method: 'PATCH',
      body: JSON.stringify({ targetListId, position: 0 })
    });
    toast(`Card moved — ${res.event.action}`);
    loadBoard();
  } catch (e) {
    toast(e.error || 'Move failed', true);
  }
}

async function loadActivity() {
  try {
    const data = await api(`/boards/${boardData.id}/activity`);
    renderActivity(data.events);
  } catch (e) {
    // fallback to preview
    try {
      const data = await api(`/boards/${boardData.id}/activity/preview`);
      renderActivity(data.events);
    } catch (e2) {
      document.getElementById('activity-list').innerHTML = '<div class="empty">No activity</div>';
    }
  }
}

function renderActivity(events) {
  const container = document.getElementById('activity-list');
  if (!events.length) {
    container.innerHTML = '<div class="empty">No activity yet. Move a card!</div>';
    return;
  }
  container.innerHTML = events.map(ev => {
    const action = ev.action === 'card_moved' ? '&#8644; moved' : '&#128172; commented on';
    const cardTitle = ev.card ? ev.card.title : 'unknown card';
    const meta = ev.meta ? JSON.parse(ev.meta) : {};
    const detail = ev.action === 'card_moved' && meta.fromListId
      ? ` <span style="color:var(--muted)">list ${meta.fromListId} → ${meta.toListId}</span>` : '';
    const time = new Date(ev.createdAt).toLocaleTimeString();
    return `<div class="activity-item">
      <span class="activity-user">${ev.user.name}</span>
      <span class="activity-action ${ev.action}">${action}</span>
      <strong>${cardTitle}</strong>${detail}
      <div class="activity-time">${time}</div>
    </div>`;
  }).join('');
}

// Enter key login
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
