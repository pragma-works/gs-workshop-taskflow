<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Kanban Board</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <h1>📋 TaskFlow</h1>
        <div class="user-info">
          <span id="userDisplay"></span>
          <button id="logoutBtn" class="btn-secondary" style="display: none;">Logout</button>
        </div>
      </div>
    </header>

    <!-- Auth Section -->
    <section id="authSection" class="auth-section">
      <div class="container">
        <div class="auth-forms">
          <!-- Login Form -->
          <div class="auth-card">
            <h2>Login</h2>
            <form id="loginForm">
              <input type="email" id="loginEmail" placeholder="Email" required>
              <input type="password" id="loginPassword" placeholder="Password" required>
              <button type="submit" class="btn-primary">Login</button>
            </form>
          </div>

          <!-- Register Form -->
          <div class="auth-card">
            <h2>Register</h2>
            <form id="registerForm">
              <input type="text" id="registerName" placeholder="Name" required>
              <input type="email" id="registerEmail" placeholder="Email" required>
              <input type="password" id="registerPassword" placeholder="Password" required>
              <button type="submit" class="btn-primary">Register</button>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- Main App Section -->
    <section id="appSection" class="app-section" style="display: none;">
      <div class="container">
        <!-- Boards List -->
        <div class="boards-section">
          <div class="section-header">
            <h2>Your Boards</h2>
            <button id="createBoardBtn" class="btn-primary">+ New Board</button>
          </div>
          <div id="boardsList" class="boards-grid"></div>
        </div>

        <!-- Board View -->
        <div id="boardView" class="board-view" style="display: none;">
          <div class="board-header">
            <button id="backToBoards" class="btn-secondary">← Back to Boards</button>
            <h2 id="boardTitle"></h2>
            <button id="viewActivityBtn" class="btn-secondary">📊 Activity Feed</button>
          </div>

          <div id="listsContainer" class="lists-container"></div>

          <!-- Activity Feed -->
          <div id="activityFeed" class="activity-feed" style="display: none;">
            <div class="activity-header">
              <h3>Activity Feed</h3>
              <button id="closeActivity" class="btn-secondary">✕</button>
            </div>
            <div id="activityList" class="activity-list"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Modals -->
  <div id="modalOverlay" class="modal-overlay" style="display: none;">
    <!-- Create Board Modal -->
    <div id="createBoardModal" class="modal" style="display: none;">
      <h3>Create New Board</h3>
      <form id="createBoardForm">
        <input type="text" id="boardName" placeholder="Board Name" required>
        <div class="modal-actions">
          <button type="button" class="btn-secondary modal-close">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>
    </div>

    <!-- Create Card Modal -->
    <div id="createCardModal" class="modal" style="display: none;">
      <h3>Create New Card</h3>
      <form id="createCardForm">
        <input type="text" id="cardTitle" placeholder="Card Title" required>
        <textarea id="cardDescription" placeholder="Description (optional)"></textarea>
        <div class="modal-actions">
          <button type="button" class="btn-secondary modal-close">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>
    </div>

    <!-- Card Details Modal -->
    <div id="cardDetailsModal" class="modal" style="display: none;">
      <div class="card-details">
        <h3 id="cardDetailsTitle"></h3>
        <p id="cardDetailsDescription"></p>
        <div class="comments-section">
          <h4>Comments</h4>
          <div id="commentsList"></div>
          <form id="addCommentForm">
            <textarea id="commentContent" placeholder="Add a comment..." required></textarea>
            <button type="submit" class="btn-primary">Add Comment</button>
          </form>
        </div>
        <div class="modal-actions">
          <button id="deleteCardBtn" class="btn-danger">Delete Card</button>
          <button type="button" class="btn-secondary modal-close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
